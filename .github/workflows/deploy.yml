name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies
        run: cd pickleball && npm install

      # ── PICKLEBALL QA (dev / in development) ─────────────────
      # Built first — uses App.tsx as-is before it gets overwritten
      - name: Build Pickleball QA
        run: |
          cd pickleball
          sed -i "s|base: '.*'|base: '/pickleball-qa/'|" vite.config.ts
          npx vite build
          mkdir -p ../deploy/pickleball-qa
          cp -r dist/. ../deploy/pickleball-qa/

      # ── PICKLEBALL STABLE (last stable = V3) ─────────────────
      - name: Build Pickleball stable
        run: |
          cd pickleball
          cp src/AppV3.tsx src/App.tsx
          sed -i "s|base: '.*'|base: '/pickleball/'|" vite.config.ts
          npx vite build
          mkdir -p ../deploy/pickleball
          cp -r dist/. ../deploy/pickleball/

      # ── PICKLEBALL V3 ─────────────────────────────────────────
      - name: Build Pickleball V3
        run: |
          cd pickleball
          cp src/AppV3.tsx src/App.tsx
          sed -i "s|base: '.*'|base: '/pickleball-v3/'|" vite.config.ts
          npx vite build
          mkdir -p ../deploy/pickleball-v3
          cp -r dist/. ../deploy/pickleball-v3/

      # ── PICKLEBALL V2 ─────────────────────────────────────────
      - name: Build Pickleball V2
        run: |
          cd pickleball
          cp src/AppV2.tsx src/App.tsx
          sed -i "s|base: '.*'|base: '/pickleball-v2/'|" vite.config.ts
          npx vite build
          mkdir -p ../deploy/pickleball-v2
          cp -r dist/. ../deploy/pickleball-v2/

      # ── PICKLEBALL V1 ─────────────────────────────────────────
      - name: Build Pickleball V1
        run: |
          cd pickleball
          cp src/AppV1.tsx src/App.tsx
          sed -i "s|base: '.*'|base: '/pickleball-v1/'|" vite.config.ts
          npx vite build
          mkdir -p ../deploy/pickleball-v1
          cp -r dist/. ../deploy/pickleball-v1/

      # ── SONIQ stable ──────────────────────────────────────────
      - name: Copy Soniq stable
        run: |
          mkdir -p deploy/soniq
          cp soniq/index.html deploy/soniq/index.html

      # ── SONIQ v1 (archived) ───────────────────────────────────
      - name: Copy SONIQ v1 archive
        run: |
          mkdir -p deploy/soniq-v1
          cp soniq-v1/index.html deploy/soniq-v1/index.html

      # ── SONIQ QA (when soniq/qa/index.html exists) ────────────
      - name: Copy Soniq QA
        run: |
          if [ -f soniq/qa/index.html ]; then
            mkdir -p deploy/soniq-qa
            cp soniq/qa/index.html deploy/soniq-qa/index.html
          fi

      # ── SONIQ QA V3 ────────────────────────────────────────────
      - name: Copy Soniq QA V3
        run: |
          if [ -f soniq/qa-v3/index.html ]; then
            mkdir -p deploy/soniq-qa-v3
            cp soniq/qa-v3/index.html deploy/soniq-qa-v3/index.html
          fi

      # ── SONIQ QA V4 ────────────────────────────────────────────
      - name: Copy Soniq QA V4
        run: |
          if [ -f soniq/qa-v4/index.html ]; then
            mkdir -p deploy/soniq-qa-v4
            cp soniq/qa-v4/index.html deploy/soniq-qa-v4/index.html
          fi

      # ── SONIQ QA V5 ────────────────────────────────────────────
      - name: Copy Soniq QA V5
        run: |
          if [ -f soniq/qa-v5/index.html ]; then
            mkdir -p deploy/soniq-qa-v5
            cp soniq/qa-v5/index.html deploy/soniq-qa-v5/index.html
          fi

      # ── SONIQ QA v6 ──────────────────────────────────────────
      - name: Copy SONIQ QA v6
        run: |
          mkdir -p deploy/soniq-qa-v6
          cp soniq/qa-v6/index.html deploy/soniq-qa-v6/index.html

      # ── SONIQ QA v7 ──────────────────────────────────────────
      - name: Copy SONIQ QA v7
        run: |
          mkdir -p deploy/soniq-qa-v7
          cp soniq/qa-v7/index.html deploy/soniq-qa-v7/index.html

      # ── SONIQ QA v8 ──────────────────────────────────────────
      - name: Copy SONIQ QA v8
        run: |
          mkdir -p deploy/soniq-qa-v8
          cp soniq/qa-v8/index.html deploy/soniq-qa-v8/index.html

      # ── SONIQ QA v9 ──────────────────────────────────────────
      - name: Copy SONIQ QA v9
        run: |
          mkdir -p deploy/soniq-qa-v9
          cp soniq/qa-v9/index.html deploy/soniq-qa-v9/index.html

      # ── SONIQ v10 (modular) ───────────────────────────────────
      - name: Build and Deploy SONIQ v10
        run: |
          cd soniq-v10
          npm install
          npx vite build
          mkdir -p ../deploy/soniq-qa-v10
          cp -r dist/. ../deploy/soniq-qa-v10/

      # ── BRAINQUEST stable ─────────────────────────────────────
      - name: Copy BrainQuest
        run: |
          if [ -f brainquest/index.html ]; then
            mkdir -p deploy/brainquest
            cp brainquest/index.html deploy/brainquest/index.html
          fi

      # ── BRAINQUEST QA ─────────────────────────────────────────
      - name: Copy BrainQuest QA
        run: |
          if [ -f brainquest/qa/index.html ]; then
            mkdir -p deploy/brainquest-qa
            cp brainquest/qa/index.html deploy/brainquest-qa/index.html
          fi

      # ── Homepage ──────────────────────────────────────────────
      - name: Copy homepage
        run: cp homepage.html deploy/index.html

      # ── CNAME ─────────────────────────────────────────────────
      - name: Copy CNAME
        run: cp CNAME deploy/CNAME

      # ── Publish ───────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: false
